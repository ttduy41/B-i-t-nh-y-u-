<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bói Tình Yêu - boitinhyeu.vn</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://img.freepik.com/free-vector/galaxy-background-with-stars_23-2148902517.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            text-align: center;
        }
        /* Header giống video */
        .header {
            background-color: #d81b60;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo {
            background: #fff;
            color: #d81b60;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }
        .menu-icon { position: absolute; right: 15px; font-size: 20px; }

        .main-content { padding: 30px 15px; }
        h1 { font-size: 24px; margin-bottom: 5px; letter-spacing: 1px; }
        .sub-text { color: #ff4081; font-weight: bold; font-size: 14px; margin-bottom: 20px; }

        /* Form nhập liệu */
        .input-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 0 auto;
        }
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        input {
            flex: 2; padding: 12px;
            border-radius: 5px; border: 1px solid #ccc;
            outline: none; font-size: 16px;
        }
        select { flex: 1; border-radius: 5px; border: 1px solid #ccc; background: #fff; }
        
        .btn-submit {
            background: #d81b60;
            color: #fff;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Modal kết quả 100% giống video */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 999; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #fff; color: #333;
            width: 85%; max-width: 380px;
            padding: 25px; border-radius: 15px;
            position: relative; animation: zoomIn 0.3s;
        }
        @keyframes zoomIn { from {transform: scale(0.7);} to {transform: scale(1);} }
        
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #aaa; }
        
        .names-header {
            display: flex; justify-content: space-between;
            font-weight: bold; font-size: 13px; color: #d81b60;
            margin: 15px 0; text-transform: uppercase;
        }

        .heart-container {
            position: relative; width: 180px; height: 160px; margin: 0 auto;
        }
        .heart-svg { width: 100%; height: 100%; fill: #fce4ec; stroke: #d81b60; stroke-width: 1; }
        .percent-num {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px; font-weight: 900; color: #d81b60;
        }

        .advice-text { font-size: 14px; color: #555; line-height: 1.6; margin-top: 15px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">♥ BOITINHYEU.VN</div>
    <div class="menu-icon">☰</div>
</div>

<div class="main-content">
    <h1>BÓI TÌNH YÊU</h1>
    <div class="sub-text">XEM TÌNH DUYÊN - CHÍNH XÁC NHẤT!</div>
    
    <div class="input-box">
        <div class="row">
            <input type="text" id="name1" placeholder="Nhập tên bạn">
            <select><option>Nam</option><option>Nữ</option></select>
        </div>
        <div class="row">
            <input type="text" id="name2" placeholder="Nhập tên người ấy">
            <select><option>Nữ</option><option>Nam</option></select>
        </div>
        <button class="btn-submit" onclick="processBoi()">GỬI ĐI</button>
    </div>
</div>

<div id="resultModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeM()">&times;</span>
        <h2 style="color: #d81b60; margin: 0; font-size: 20px;">KẾT QUẢ</h2>
        
        <div class="names-header">
            <div id="res1" style="width: 45%;"></div>
            <div id="res2" style="width: 45%;"></div>
        </div>

        <div class="heart-container">
            <svg viewBox="0 0 32 29.6" class="heart-svg">
                <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,16,21.2,16,21.2s16-11.8,16-21.2C32,3.8,28.2,0,23.6,0z"/>
            </svg>
            <div class="percent-num" id="finalNum">0%</div>
        </div>

        <div class="advice-text" id="advice">
            Đang phân tích dữ liệu từ Dr.Love...
        </div>
    </div>
</div>

<script>
    function processBoi() {
        let n1 = document.getElementById('name1').value.trim();
        let n2 = document.getElementById('name2').value.trim();
        
        if(!n1 || !n2) { alert("Nhập tên vào đã bạn ơi!"); return; }

        let n1L = n1.toLowerCase();
        let n2L = n2.toLowerCase();
        let p = 0;

        // KIỂM TRA TÊN CỐ ĐỊNH 100%
        const isVinh = n1L.includes("đỗ hoàng vinh") || n2L.includes("đỗ hoàng vinh");
        const isMy = n1L.includes("nguyễn thị diễm my") || n2L.includes("nguyễn thị diễm my");

        if(isVinh && isMy) {
            p = 100;
        } else {
            // Hash cố định cho các tên khác
            let s = (n1L + n2L).split('').sort().join('');
            let sum = 0;
            for(let i=0; i<s.length; i++) sum += s.charCodeAt(i);
            p = (sum % 40) + 45; // Kết quả ngẫu nhiên nhưng cố định
        }

        document.getElementById('res1').innerText = n1;
        document.getElementById('res2').innerText = n2;
        document.getElementById('resultModal').style.display = 'flex';

        let count = 0;
        let speed = p === 100 ? 10 : 30;
        let timer = setInterval(() => {
            if(count >= p) {
                clearInterval(timer);
                showAdvice(p);
            } else {
                count++;
                document.getElementById('finalNum').innerText = count + "%";
            }
        }, speed);
    }

    function showAdvice(p) {
        let a = document.getElementById('advice');
        if(p === 100) a.innerHTML = "<b>Chúc mừng!</b> Đỗ Hoàng Vinh và Nguyễn Thị Diễm My sinh ra là để dành cho nhau. Tỷ lệ khớp lệnh là tuyệt đối!";
        else a.innerHTML = "Mối quan hệ này có nhiều điểm tương đồng. Hãy cùng nhau vun đắp để bền chặt hơn nhé!";
    }

    function closeM() { document.getElementById('resultModal').style.display = 'none'; }
</script>

</body>
</html>
