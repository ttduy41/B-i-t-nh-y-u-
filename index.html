<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bói Tình Yêu - boitinhyeu.vn</title>
    <style>
        :root { --main-color: #e91e63; }
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: url('https://boitinhyeu.vn/templates/images/bg_home.jpg') no-repeat center top;
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
        }
        /* Header */
        .header {
            background-color: var(--main-color);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .logo-box {
            background: #fff;
            color: var(--main-color);
            padding: 3px 10px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
        }
        .menu-toggle { position: absolute; right: 15px; font-size: 24px; color: #fff; }

        .content { padding: 20px; text-align: center; }
        h1 { font-size: 26px; margin: 10px 0; text-transform: uppercase; font-weight: 800; }
        .subtitle { color: #fff; font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .highlight-text { color: #fdf200; font-weight: bold; text-transform: uppercase; font-size: 18px; }

        /* Form Nhập */
        .form-container {
            margin-top: 30px;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }
        .input-group {
            display: flex;
            background: #fff;
            border-radius: 5px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #ddd;
        }
        input {
            flex: 3; border: none; padding: 12px; outline: none; font-size: 15px; color: #333;
        }
        select {
            flex: 1; border: none; border-left: 1px solid #eee; background: #f9f9f9;
            padding: 10px; font-size: 14px; color: #666;
        }
        .btn-submit {
            background-color: var(--main-color);
            color: #fff;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 0 #ad1457;
        }
        
        .scroll-down { margin-top: 20px; font-size: 12px; }

        /* Result Popup - Giống Video 100% */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center;
        }
        .modal-box {
            background: #fff; color: #333; width: 90%; max-width: 380px;
            border-radius: 8px; position: relative; padding: 20px; text-align: center;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .close-icon { position: absolute; top: 10px; right: 15px; font-size: 25px; color: #ccc; cursor: pointer; }
        .modal-title { color: var(--main-color); font-size: 18px; font-weight: bold; margin-top: 10px; }
        
        .names-display {
            display: flex; justify-content: space-around; font-weight: bold;
            color: var(--main-color); margin: 20px 0; font-size: 14px; text-transform: uppercase;
        }

        .heart-wrap { position: relative; width: 160px; height: 140px; margin: 0 auto; }
        .heart-bg { fill: #fce4ec; stroke: var(--main-color); stroke-width: 1.5; }
        .percent-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 35px; font-weight: 900; color: var(--main-color);
        }
        .advice { margin-top: 15px; font-size: 13px; color: #666; line-height: 1.6; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-box">♥ BOITINHYEU.VN</div>
    <div class="menu-toggle">☰</div>
</div>

<div class="content">
    <h1>BÓI TÌNH YÊU</h1>
    <div class="subtitle">XEM TÌNH DUYÊN</div>
    <div class="highlight-text">CHÍNH XÁC NHẤT!</div>
    <p style="font-size: 12px; opacity: 0.9; margin-top: 15px;">Mời bạn điền họ và tên (đầy đủ dấu) vào 2 ô dưới:</p>

    <div class="form-container">
        <div class="input-group">
            <input type="text" id="name1" placeholder="Nhập tên bạn">
            <select><option>Nam</option><option>Nữ</option></select>
        </div>
        <div class="input-group">
            <input type="text" id="name2" placeholder="Nhập tên người ấy">
            <select><option>Nữ</option><option>Nam</option></select>
        </div>
        <button class="btn-submit" onclick="runCheck()">GỬI ĐI</button>
    </div>

    <div class="scroll-down">
        <div>🖱️</div>
        Cuộn xuống
    </div>
</div>

<div id="loveModal" class="modal-overlay">
    <div class="modal-box">
        <span class="close-icon" onclick="closeModal()">&times;</span>
        <div class="modal-title">BÓI TÌNH YÊU</div>
        <p style="font-size: 11px;">Dưới đây là kết quả từ Dr.Love!</p>
        
        <div class="names-display">
            <div id="n1_show"></div>
            <div id="n2_show"></div>
        </div>

        <div class="heart-wrap">
            <svg viewBox="0 0 32 29.6" class="heart-bg">
                <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,16,21.2,16,21.2s16-11.8,16-21.2C32,3.8,28.2,0,23.6,0z"/>
            </svg>
            <div class="percent-display" id="numResult">0%</div>
        </div>

        <div class="advice" id="adviceTxt"></div>
    </div>
</div>

<script>
    function runCheck() {
        let v1 = document.getElementById('name1').value.trim();
        let v2 = document.getElementById('name2').value.trim();
        if(!v1 || !v2) return;

        let p = 0;
        let v1L = v1.toLowerCase();
        let v2L = v2.toLowerCase();

        // 100% CỐ ĐỊNH CHO VINH & MY
        if((v1L.includes("đỗ hoàng vinh") && v2L.includes("nguyễn thị diễm my")) || 
           (v2L.includes("đỗ hoàng vinh") && v1L.includes("nguyễn thị diễm my"))) {
            p = 100;
        } else {
            // Logic hash để tên không đổi thì % không đổi
            let combined = (v1L + v2L).split('').sort().join('');
            let sum = 0;
            for(let i=0; i<combined.length; i++) sum += combined.charCodeAt(i);
            p = (sum % 50) + 40; 
        }

        document.getElementById('n1_show').innerText = v1;
        document.getElementById('n2_show').innerText = v2;
        document.getElementById('loveModal').style.display = 'flex';

        let current = 0;
        let step = p === 100 ? 5 : 20;
        let itv = setInterval(() => {
            if(current >= p) {
                clearInterval(itv);
                document.getElementById('adviceTxt').innerHTML = p === 100 ? 
                "Hai bạn sinh ra là định mệnh của nhau! Đừng để lạc mất nhau nhé." : 
                "Mối quan hệ này khá ổn, cần thêm sự sẻ chia để gắn kết hơn.";
            } else {
                current++;
                document.getElementById('numResult').innerText = current + "%";
            }
        }, step);
    }

    function closeModal() { document.getElementById('loveModal').style.display = 'none'; }
</script>

</body>
</html>
